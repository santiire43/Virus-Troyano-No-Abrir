<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO ABRIR</title>
    <style>
        /* Definición de variables de colores pastel para el fondo */
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #b3e5fc;
            --pastel-purple: #d1c4e9;
            --pastel-yellow: #fff9c4;
            --pastel-green: #c8e6c9;
        }

        /* Reset básico y centrado total */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Fondo dinámico animado con gradiente */
        body {
            background: linear-gradient(-45deg, var(--pastel-pink), var(--pastel-blue), var(--pastel-purple), var(--pastel-green));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor del mensaje con bordes neón */
        .neon-container {
            padding: 3rem 5rem;
            border: 4px solid #fff;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #ff00de,
                inset 0 0 20px #ff00de;
            animation: borderPulse 3s infinite alternate;
            text-align: center;
            max-width: 90vw;
        }

        @keyframes borderPulse {
            0% {
                border-color: #fff;
                box-shadow: 0 0 10px #fff, 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
            }
            50% {
                border-color: #f0f;
                box-shadow: 0 0 15px #f0f, 0 0 30px #f0f, inset 0 0 15px #f0f;
            }
            100% {
                border-color: #0f0;
                box-shadow: 0 0 10px #0f0, 0 0 25px #0f0, inset 0 0 10px #0f0;
            }
        }

        /* Texto fluorescente dinámico */
        .neon-text {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            /* Aplicamos sombra para el efecto de brillo neón */
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #0fa,
                0 0 82px #0fa,
                0 0 92px #0fa,
                0 0 102px #0fa,
                0 0 151px #0fa;
            animation: textGlow 4s infinite alternate;
            user-select: none;
        }

        @keyframes textGlow {
            0% {
                color: #fff;
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e60073, 0 0 40px #e60073, 0 0 50px #e60073, 0 0 60px #e60073, 0 0 70px #e60073;
            }
            33% {
                color: #fff;
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #00f2ff, 0 0 40px #00f2ff, 0 0 50px #00f2ff, 0 0 60px #00f2ff, 0 0 70px #00f2ff;
            }
            66% {
                color: #fff;
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #bcff00, 0 0 40px #bcff00, 0 0 50px #bcff00, 0 0 60px #bcff00, 0 0 70px #bcff00;
            }
            100% {
                color: #fff;
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #f0f, 0 0 40px #f0f, 0 0 50px #f0f, 0 0 60px #f0f, 0 0 70px #f0f;
            }
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .neon-text {
                font-size: 2rem;
            }
            .neon-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="neon-container">
        <h1 class="neon-text">Puto el que lee, draken manco, me gustan las menores</h1>
    </div>

</body>
</html>
